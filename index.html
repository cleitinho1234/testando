<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Treino de Digitação PRO</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
transition:0.3s;
}

.dark{ background:#111; color:white; }
.light{ background:#f5f5f5; color:black; }

.container{
max-width:800px;
width:100%;
}

#text{
padding:20px;
border-radius:10px;
line-height:1.8;
font-size:20px;
background:rgba(0,0,0,0.2);
}

.correct{ color:#00ff88; }
.wrong{ color:#ff4d4d; }

#input{
width:100%;
margin-top:20px;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
outline:none;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:20px;
}

button, select{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* botão jogo destaque */
.game-btn{
background:#ff9800;
color:black;
font-weight:bold;
}

#history{
margin-top:20px;
font-size:14px;
max-height:150px;
overflow:auto;
}

</style>

</head>

<body class="dark">

<h1>⌨️ Treino de Digitação PRO</h1>

<div class="container">

<button onclick="toggleTheme()">🌙 / ☀️ Tema</button>

<br>

<select id="level" onchange="startGame()">
<option value="easy">Fácil</option>
<option value="medium">Médio</option>
<option value="hard">Difícil</option>
</select>

<!-- BOTÃO DO JOGO -->

<button class="game-btn" onclick="irParaJogo()">🎮 Modo Jogo (Letras Caindo)</button>

<div id="text"></div>

<input id="input" placeholder="Comece a digitar..." autofocus>

<div class="stats">
<span>⏱️ <span id="time">0</span>s</span>
<span>⚡ <span id="wpm">0</span> WPM</span>
<span>🎯 <span id="accuracy">100</span>%</span>
</div>

<button onclick="startGame()">🔁 Reiniciar</button>

<div id="history"></div>

</div>

<script>

function irParaJogo(){
window.location.href = "game.html"
}

const texts = {
easy:[
"o gato corre no telhado",
"eu gosto de programar",
"digitar rapido ajuda muito"
],
medium:[
"praticar digitacao melhora sua produtividade",
"o sucesso depende da disciplina diaria",
"javascript permite criar coisas incriveis"
],
hard:[
"a persistencia e o caminho do exito verdadeiro",
"desenvolver habilidades exige foco e consistencia",
"tecnologia avanca rapidamente no mundo moderno"
]
}

let currentText=""
let startTime
let timer

const textEl=document.getElementById("text")
const input=document.getElementById("input")
const timeEl=document.getElementById("time")
const wpmEl=document.getElementById("wpm")
const accEl=document.getElementById("accuracy")
const historyEl=document.getElementById("history")
const levelEl=document.getElementById("level")

function toggleTheme(){
document.body.classList.toggle("dark")
document.body.classList.toggle("light")
}

function keySound(){
let ctx=new AudioContext()
let osc=ctx.createOscillator()
osc.frequency.value=500
osc.connect(ctx.destination)
osc.start()
setTimeout(()=>osc.stop(),50)
}

function startGame(){

let level=levelEl.value
let arr=texts[level]

currentText=arr[Math.floor(Math.random()*arr.length)]

textEl.innerHTML=""

currentText.split("").forEach(c=>{
let span=document.createElement("span")
span.innerText=c
textEl.appendChild(span)
})

input.value=""
input.focus()

startTime=new Date()

clearInterval(timer)
timer=setInterval(()=>{
timeEl.innerText=Math.floor((new Date()-startTime)/1000)
},1000)

}

input.addEventListener("input",()=>{

keySound()

let chars=textEl.querySelectorAll("span")
let typed=input.value

let correct=0

chars.forEach((char,i)=>{
let t=typed[i]

if(t==null){
char.classList.remove("correct","wrong")
}
else if(t===char.innerText){
char.classList.add("correct")
char.classList.remove("wrong")
correct++
}else{
char.classList.add("wrong")
char.classList.remove("correct")
}
})

let acc=Math.floor((correct/typed.length)*100)||100
accEl.innerText=acc

let time=(new Date()-startTime)/1000/60
let words=typed.length/5
let wpm=Math.floor(words/time)||0
wpmEl.innerText=wpm

if(typed === currentText){
saveHistory(wpm,acc)
startGame()
}

})

function saveHistory(wpm,acc){

let data=JSON.parse(localStorage.getItem("history")||"[]")

data.unshift(`WPM: ${wpm} | Precisão: ${acc}%`)

localStorage.setItem("history",JSON.stringify(data.slice(0,10)))

showHistory()
}

function showHistory(){

let data=JSON.parse(localStorage.getItem("history")||"[]")

historyEl.innerHTML="<h3>📊 Histórico</h3>"

data.forEach(d=>{
historyEl.innerHTML += "<div>"+d+"</div>"
})

}

showHistory()
startGame()

</script>

</body>
</html>
