<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Completo</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
}

/* câmera (mapa) */
#world{
position:absolute;
width:3000px;
height:2000px;
}

/* jogador */
#player{
position:absolute;
left:300px;
top:200px;
display:flex;
flex-direction:column;
align-items:center;
}

/* asas */
.wings{
position:absolute;
top:35px;
width:160px;
display:flex;
justify-content:space-between;
z-index:0;
filter:drop-shadow(0 0 8px #00ff88);
}

.wing{ width:80px; }
.wing.right{ transform:scaleX(-1); }

/* cabeça/corpo iguais */
.head,.body,.legs{ z-index:2; position:relative; }

.head{
width:40px;height:40px;background:#f1c27d;border:2px solid black;position:relative;
}
.eye{width:6px;height:6px;background:black;border-radius:50%;position:absolute;top:12px;}
.eye.left{left:8px;} .eye.right{right:8px;}
.mouth{width:14px;height:6px;border-bottom:3px solid black;position:absolute;bottom:8px;left:50%;transform:translateX(-50%);}

.body{width:40px;height:50px;background:#3cb043;border:2px solid black;position:relative;}

.arm{width:12px;height:45px;background:#f1c27d;border:2px solid black;position:absolute;top:0;}
.arm.left{left:-16px;} .arm.right{right:-16px;}

.legs{display:flex;gap:10px;}
.leg{width:12px;height:40px;background:#1e3d59;border:2px solid black;}

/* inimigo */
.enemy{
position:absolute;
width:40px;
height:40px;
background:red;
}

/* vida */
#life{
position:fixed;
top:10px;
left:10px;
background:black;
color:white;
padding:10px;
font-weight:bold;
}

/* fogo */
.fire{
position:absolute;
width:20px;height:20px;
background:orange;
border-radius:50%;
}

/* chão */
.ground{
position:absolute;
bottom:0;
width:100%;
height:200px;
background:#5a3d1e;
}

</style>

</head>

<body>

<div id="life">❤️ Vida: 100</div>

<div id="world">

<div id="player">

<div class="wings">
<img src="asa.png" class="wing">
<img src="asa.png" class="wing right">
</div>

<div class="head">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth"></div>
</div>

<div class="body">
<div class="arm left"></div>
<div class="arm right"></div>
</div>

<div class="legs">
<div class="leg"></div>
<div class="leg"></div>
</div>

</div>

<div class="ground"></div>

</div>

<script>

const player = document.getElementById("player")
const world = document.getElementById("world")
const lifeUI = document.getElementById("life")

let x=300,y=200
let speed=5
let keys={}
let direction="right"
let life=100

/* som simples */
function beep(freq){
let ctx=new AudioContext()
let osc=ctx.createOscillator()
osc.frequency.value=freq
osc.connect(ctx.destination)
osc.start()
setTimeout(()=>osc.stop(),100)
}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
if(e.key==="Shift") shoot()
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

/* inimigos */
let enemies=[]

function spawnEnemy(){
let e=document.createElement("div")
e.className="enemy"
e.x=Math.random()*2500
e.y=1500
world.appendChild(e)
enemies.push(e)
}
setInterval(spawnEnemy,2000)

/* tiro */
function shoot(){
beep(600)

let fire=document.createElement("div")
fire.className="fire"
let fx=x, fy=y
world.appendChild(fire)

let dir=direction

function move(){
if(dir==="right") fx+=10
if(dir==="left") fx-=10
if(dir==="up") fy-=10
if(dir==="down") fy+=10

fire.style.left=fx+"px"
fire.style.top=fy+"px"

/* colisão */
enemies.forEach((e,i)=>{
let ex=e.x, ey=e.y
if(Math.abs(fx-ex)<30 && Math.abs(fy-ey)<30){
e.remove()
enemies.splice(i,1)
fire.remove()
}
})

requestAnimationFrame(move)
}
move()
}

/* loop */
function loop(){

if(keys["a"]){ x-=speed; direction="left" }
if(keys["d"]){ x+=speed; direction="right" }
if(keys["w"]){ y-=speed; direction="up" }
if(keys["s"]){ y+=speed; direction="down" }

/* câmera segue */
world.style.left = -x + window.innerWidth/2 + "px"
world.style.top  = -y + window.innerHeight/2 + "px"

player.style.left=x+"px"
player.style.top=y+"px"

/* inimigos seguem jogador */
enemies.forEach(e=>{
if(e.x < x) e.x+=1
if(e.x > x) e.x-=1
if(e.y < y) e.y+=1
if(e.y > y) e.y-=1

e.style.left=e.x+"px"
e.style.top=e.y+"px"

/* dano */
if(Math.abs(e.x-x)<30 && Math.abs(e.y-y)<30){
life-=0.1
}
})

lifeUI.innerText="❤️ Vida: "+Math.floor(life)

requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
