<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Zap</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

#chat {
  height: 300px;
  overflow-y: auto;
  border: 1px solid #333;
  margin: 20px;
  padding: 10px;
}

input, button {
  padding: 10px;
  margin: 5px;
}
</style>

</head>
<body>

<h2>Seu ID: <span id="meuId"></span></h2>

<input id="idDestino" placeholder="ID da pessoa">
<button onclick="buscarUsuario()">Adicionar</button>

<div id="chat"></div>

<input id="msg" placeholder="Mensagem">
<button onclick="enviar()">Enviar</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const SERVER = "https://mini-zap-2.onrender.com"; // <-- MUDA ISSO

let socket = io(SERVER);

let meuId = null;
let destino = null;

// 🔹 CRIAR USUÁRIO
async function iniciar() {
  const res = await fetch(SERVER + "/register", {
    method: "POST"
  });

  const data = await res.json();

  meuId = data.id;
  document.getElementById("meuId").innerText = meuId;

  socket.emit("join", meuId);
}

// 🔹 BUSCAR USUÁRIO
async function buscarUsuario() {
  const id = document.getElementById("idDestino").value;

  const res = await fetch(SERVER + "/user/" + id);

  if (res.ok) {
    destino = id;
    alert("Usuário encontrado!");
  } else {
    alert("ID inválido");
  }
}

// 🔹 ENVIAR MENSAGEM
function enviar() {
  const text = document.getElementById("msg").value;

  socket.emit("sendMessage", {
    from: meuId,
    to: destino,
    text
  });
}

// 🔹 RECEBER MENSAGEM
socket.on("receiveMessage", (msg) => {
  const div = document.createElement("div");
  div.innerText = msg.from + ": " + msg.text;
  document.getElementById("chat").appendChild(div);
});

// iniciar automático
iniciar();
</script>

</body>
</html>
