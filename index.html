<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personagem nível jogo</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
}

/* jogador */
#player{
position:absolute;
left:300px;
top:200px;
display:flex;
flex-direction:column;
align-items:center;
}

/* ===== ASAS ===== */

.wings{
position:absolute;
top:35px;
width:160px;
display:flex;
justify-content:space-between;
pointer-events:none;
z-index:0;
filter:drop-shadow(0 0 8px #00ff88);
}

/* asas */
.wing{
width:80px;
transition:0.3s;
}

/* direita invertida */
.wing.right{
transform:scaleX(-1);
}

/* asas abertas quando andando */
.walk .wing.left{
transform:rotate(-20deg);
}

.walk .wing.right{
transform:scaleX(-1) rotate(20deg);
}

/* voando (bate mais rápido) */
.flying .wing{
animation:flap 0.25s infinite alternate;
}

@keyframes flap{
from{ transform:translateY(0px); }
to{ transform:translateY(-15px); }
}

/* cabeça */
.head{
width:40px;
height:40px;
background:#f1c27d;
border:2px solid black;
position:relative;
z-index:2;
}

.eye{
width:6px;
height:6px;
background:black;
border-radius:50%;
position:absolute;
top:12px;
}

.eye.left{ left:8px; }
.eye.right{ right:8px; }

.mouth{
width:14px;
height:6px;
border-bottom:3px solid black;
position:absolute;
bottom:8px;
left:50%;
transform:translateX(-50%);
}

/* corpo */
.body{
width:40px;
height:50px;
background:#3cb043;
border:2px solid black;
position:relative;
z-index:2;
}

/* braços */
.arm{
width:12px;
height:45px;
background:#f1c27d;
border:2px solid black;
position:absolute;
top:0;
transform-origin:top;
}

.arm.left{ left:-16px; }
.arm.right{ right:-16px; }

/* pernas */
.legs{
display:flex;
gap:10px;
z-index:2;
}

.leg{
width:12px;
height:40px;
background:#1e3d59;
border:2px solid black;
transform-origin:top;
}

/* animação andar */
.walk .leg.left{ animation:leg1 0.4s infinite alternate; }
.walk .leg.right{ animation:leg2 0.4s infinite alternate; }
.walk .arm.left{ animation:arm1 0.4s infinite alternate; }
.walk .arm.right{ animation:arm2 0.4s infinite alternate; }

@keyframes leg1{
from{transform:rotate(25deg)}
to{transform:rotate(-25deg)}
}

@keyframes leg2{
from{transform:rotate(-25deg)}
to{transform:rotate(25deg)}
}

@keyframes arm1{
from{transform:rotate(-25deg)}
to{transform:rotate(25deg)}
}

@keyframes arm2{
from{transform:rotate(25deg)}
to{transform:rotate(-25deg)}
}

/* ===== PODER ===== */

.fire{
position:absolute;
width:20px;
height:20px;
background:radial-gradient(circle, yellow, orange, red);
border-radius:50%;
box-shadow:0 0 20px orange, 0 0 40px red;
}

/* explosão */
.explosion{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
background:radial-gradient(circle, yellow, red);
animation:boom 0.3s forwards;
}

@keyframes boom{
from{transform:scale(1); opacity:1;}
to{transform:scale(2); opacity:0;}
}

/* chão */
#ground{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#5a3d1e;
}

</style>

</head>

<body>

<div id="player">

<div class="wings">
<img src="asa.png" class="wing left">
<img src="asa.png" class="wing right">
</div>

<div class="head">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth"></div>
</div>

<div class="body">
<div class="arm left"></div>
<div class="arm right"></div>
</div>

<div class="legs">
<div class="leg left"></div>
<div class="leg right"></div>
</div>

</div>

<div id="ground"></div>

<script>

const player = document.getElementById("player")

let x = 300
let y = 200
let speed = 5

let keys = {}
let direction = "right"
let flying = false

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true

if(e.key === "Shift"){
shootFire()
}

if(e.key === " "){
flying = true
}
})

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false

if(e.key === " "){
flying = false
}
})

function shootFire(){

let fire = document.createElement("div")
fire.className = "fire"

let fx = x + 20
let fy = y + 40

fire.style.left = fx + "px"
fire.style.top = fy + "px"

document.body.appendChild(fire)

let speedFire = 10
let life = 0
let fireDirection = direction

function moveFire(){

life++

if(fireDirection === "right") fx += speedFire
if(fireDirection === "left") fx -= speedFire
if(fireDirection === "up") fy -= speedFire
if(fireDirection === "down") fy += speedFire

fire.style.left = fx + "px"
fire.style.top = fy + "px"

if(life < 80){
requestAnimationFrame(moveFire)
}else{

let boom = document.createElement("div")
boom.className = "explosion"
boom.style.left = fx + "px"
boom.style.top = fy + "px"
document.body.appendChild(boom)

setTimeout(()=>boom.remove(),300)

fire.remove()
}

}

moveFire()

}

function gameLoop(){

let moving = false

if(keys["a"] || keys["arrowleft"]){
x -= speed
direction = "left"
moving = true
}

if(keys["d"] || keys["arrowright"]){
x += speed
direction = "right"
moving = true
}

if(keys["w"] || keys["arrowup"]){
y -= speed
direction = "up"
moving = true
}

if(keys["s"] || keys["arrowdown"]){
y += speed
direction = "down"
moving = true
}

/* voo */
if(flying){
y -= 3
player.classList.add("flying")
}else{
player.classList.remove("flying")
}

player.style.left = x + "px"
player.style.top = y + "px"

if(moving){
player.classList.add("walk")
}else{
player.classList.remove("walk")
}

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
