<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boneco estilo Minecraft</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
}

#game{
position:relative;
width:100vw;
height:100vh;
}

#player{
position:absolute;
left:300px;
top:200px;
}

/* cabeça */
.head{
width:40px;
height:40px;
background:#f1c27d;
border:2px solid black;
margin:auto;
}

/* corpo */
.body{
width:40px;
height:50px;
background:#3cb043;
border:2px solid black;
margin:auto;
}

/* braços */
.arms{
display:flex;
justify-content:space-between;
width:80px;
margin:auto;
margin-top:-50px;
}

.arm{
width:15px;
height:50px;
background:#f1c27d;
border:2px solid black;
}

/* pernas */
.legs{
display:flex;
justify-content:center;
gap:10px;
}

.leg{
width:15px;
height:40px;
background:#1e3d59;
border:2px solid black;
}

#ground{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#5a3d1e;
}

</style>

</head>

<body>

<div id="game">

<div id="player">

<div class="head"></div>

<div class="arms">
<div class="arm"></div>
<div class="arm"></div>
</div>

<div class="body"></div>

<div class="legs">
<div class="leg"></div>
<div class="leg"></div>
</div>

</div>

<div id="ground"></div>

</div>

<script>

const player = document.getElementById("player")

let x = 300
let y = 200
let speed = 5

let keys = {}

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true
})

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false
})

function gameLoop(){

if(keys["w"] || keys["arrowup"]){
y -= speed
}

if(keys["s"] || keys["arrowdown"]){
y += speed
}

if(keys["a"] || keys["arrowleft"]){
x -= speed
}

if(keys["d"] || keys["arrowright"]){
x += speed
}

player.style.left = x + "px"
player.style.top = y + "px"

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
