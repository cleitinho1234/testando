<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Treino de Digitação</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* título */
h1{
margin-bottom:10px;
}

/* caixa principal */
.container{
max-width:800px;
width:100%;
}

/* texto */
#text{
background:#222;
padding:20px;
border-radius:10px;
line-height:1.8;
font-size:20px;
}

/* letras */
.correct{ color:#00ff88; }
.wrong{ color:#ff4d4d; }

/* input */
#input{
width:100%;
margin-top:20px;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
outline:none;
}

/* stats */
.stats{
display:flex;
justify-content:space-between;
margin-top:20px;
}

/* botão */
button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#00ff88;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<h1>⌨️ Treino de Digitação</h1>

<div class="container">

<div id="text"></div>

<input id="input" placeholder="Comece a digitar..." autofocus>

<div class="stats">
<span>⏱️ Tempo: <span id="time">0</span>s</span>
<span>⚡ WPM: <span id="wpm">0</span></span>
<span>🎯 Precisão: <span id="accuracy">100</span>%</span>
</div>

<button onclick="startGame()">🔁 Reiniciar</button>

</div>

<script>

const texts = [
"o sucesso vem para quem pratica todos os dias",
"digitar rapido e uma habilidade muito valiosa",
"treine foco disciplina e velocidade sempre",
"voce consegue melhorar com pratica constante"
]

let currentText = ""
let startTime
let timerInterval

const textEl = document.getElementById("text")
const input = document.getElementById("input")
const timeEl = document.getElementById("time")
const wpmEl = document.getElementById("wpm")
const accEl = document.getElementById("accuracy")

function startGame(){

currentText = texts[Math.floor(Math.random()*texts.length)]
textEl.innerHTML = ""

currentText.split("").forEach(char=>{
let span = document.createElement("span")
span.innerText = char
textEl.appendChild(span)
})

input.value = ""
input.focus()

startTime = new Date()

clearInterval(timerInterval)
timerInterval = setInterval(updateTime,1000)

}

input.addEventListener("input",()=>{

let chars = textEl.querySelectorAll("span")
let inputText = input.value

let correct = 0

chars.forEach((char,index)=>{

let typed = inputText[index]

if(typed == null){
char.classList.remove("correct","wrong")
}
else if(typed === char.innerText){
char.classList.add("correct")
char.classList.remove("wrong")
correct++
}else{
char.classList.add("wrong")
char.classList.remove("correct")
}

})

/* precisão */
let accuracy = Math.floor((correct/inputText.length)*100) || 100
accEl.innerText = accuracy

/* WPM */
let time = (new Date() - startTime)/1000/60
let words = inputText.length / 5
let wpm = Math.floor(words / time) || 0
wpmEl.innerText = wpm

})

function updateTime(){
let time = Math.floor((new Date() - startTime)/1000)
timeEl.innerText = time
}

startGame()

</script>

</body>
</html>
