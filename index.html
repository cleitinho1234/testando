<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alarme PRO MAX</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

#lista {
    margin-top: 20px;
}

.alarm {
    background: #1e293b;
    padding: 15px;
    margin: 10px auto;
    border-radius: 12px;
    width: 260px;
}

.ativo { color: #22c55e; }
.desligado { color: #ef4444; }

#parar {
    background: red;
    display: none;
}

input[type="file"] {
    display: none;
}

.file-btn {
    background: #334155;
    color: white;
}

.modal {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.box {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}
</style>

</head>

<body>

<h1>⏰ Alarme PRO MAX</h1>

<button onclick="abrirModal()">+ Novo Alarme</button>

<br><br> <button id="parar" onclick="pararAlarme()">PARAR ALARME</button>

<div id="lista"></div>

<div id="modal" class="modal">
    <div class="box">
        <h3>Novo Alarme</h3>

```
    <input type="text" id="hora" placeholder="HH:MM" maxlength="5"><br>

    <p id="nomeAudio">Nenhum som selecionado</p>

    <button class="file-btn" onclick="inputAudio.click()">
        Escolha seu som
    </button>

    <input type="file" id="inputAudio" accept="audio/*">

    <br><br>
    <button onclick="salvarAlarme()">Salvar</button>
    <button onclick="fecharModal()">Cancelar</button>
</div>
```

</div>

<script>
let alarmes = JSON.parse(localStorage.getItem("alarmes")) || [];

function salvar() {
    localStorage.setItem("alarmes", JSON.stringify(alarmes));
}

// FORMATAR HORA
const inputHora = document.getElementById("hora");

inputHora.addEventListener("input", () => {
    let v = inputHora.value.replace(/\D/g, "");
    if (v.length >= 3) v = v.slice(0,2)+":"+v.slice(2,4);
    inputHora.value = v;
});

// AUDIO BASE64
const inputAudio = document.getElementById("inputAudio");

inputAudio.addEventListener("change", () => {
    let file = inputAudio.files[0];
    document.getElementById("nomeAudio").innerText =
        file ? file.name : "Nenhum som selecionado";
});

function abrirModal() {
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

// 🔥 SALVAR COM BASE64
function salvarAlarme() {
    const hora = inputHora.value;
    const file = inputAudio.files[0];

    if (!hora || hora.length < 5) {
        alert("Hora inválida!");
        return;
    }

    if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
            alarmes.push({
                hora: hora,
                audio: e.target.result,
                ativo: true
            });

            salvar();
            render();
            fecharModal();
        };

        reader.readAsDataURL(file);

    } else {
        alarmes.push({
            hora: hora,
            audio: "",
            ativo: true
        });

        salvar();
        render();
        fecharModal();
    }
}

// RENDER
function render(){
    let lista = document.getElementById("lista");
    lista.innerHTML="";

    alarmes.forEach((a,i)=>{
        lista.innerHTML+=`
        <div class="alarm">
            <h3>${a.hora}</h3>
            <p class="${a.ativo?'ativo':'desligado'}">${a.ativo?'Ativo':'Desligado'}</p>

            <button onclick="toggle(${i})">On/Off</button>
            <button onclick="remover(${i})">Remover</button>
        </div>`;
    });
}

function toggle(i){
    alarmes[i].ativo = !alarmes[i].ativo;
    salvar(); render();
}

function remover(i){
    alarmes.splice(i,1);
    salvar(); render();
}

// ALARME
let tocando=null;
let repetindo=false;

function pararAlarme(){
    repetindo=false;
    if(tocando){ tocando.pause(); tocando=null; }
    document.getElementById("parar").style.display="none";
}

setInterval(()=>{
    let d=new Date();
    let atual = d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");

    alarmes.forEach(a=>{
        if(a.hora===atual && a.ativo && !repetindo){

            repetindo=true;
            document.getElementById("parar").style.display="inline-block";

            function tocar(){
                if(!repetindo) return;

                tocando=new Audio(a.audio || "https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
                tocando.play();

                setTimeout(()=>{
                    if(tocando){ tocando.pause(); tocando=null; }
                    tocar();
                },30000);
            }

            tocar();
        }
    });

},1000);

render();
</script>

</body>
</html>
