<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Modo Jogo PRO</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#111;
color:white;
}

#hud{
position:fixed;
top:10px;
left:10px;
background:black;
padding:10px;
border-radius:8px;
z-index:10;
}

#game{
position:relative;
width:100vw;
height:100vh;
}

/* palavra */
.word{
position:absolute;
font-size:26px;
font-weight:bold;
white-space:nowrap;
}

/* letras */
.letter{
color:#00ff88;
}

.correct{
color:yellow;
}

</style>

</head>

<body>

<div id="hud">
❤️ Vida: <span id="life">10</span><br>
⏱️ Tempo: <span id="time">0</span>s
</div>

<div id="game"></div>

<script>

const game = document.getElementById("game")
const lifeEl = document.getElementById("life")
const timeEl = document.getElementById("time")

let words = []
let life = 10
let time = 0

let speed = 0.4
let spawnRate = 2500

let currentInput = ""

/* palavras */
const wordList = [
"casa","gato","tempo","codigo","teclado","rapido",
"energia","disciplina","javascript","computador",
"desafio","velocidade","pratica","evolucao"
]

/* evita sobreposição */
let lastX = 0

function spawnWord(){

let word = wordList[Math.floor(Math.random()*wordList.length)]

let w = document.createElement("div")
w.className="word"

/* cria letras separadas */
word.split("").forEach(c=>{
let span = document.createElement("span")
span.innerText = c
span.className = "letter"
w.appendChild(span)
})

/* posição organizada */
let x = Math.random() * (window.innerWidth - 200)

/* evita nascer muito perto da anterior */
if(Math.abs(x - lastX) < 120){
x += 150
}

lastX = x

w.x = x
w.y = 0
w.text = word
w.typed = 0

w.style.left = x + "px"
w.style.top = "0px"

game.appendChild(w)

words.push(w)
}

/* loop */
function update(){

words.forEach((w,i)=>{

w.y += speed
w.style.top = w.y + "px"

/* chegou no chão */
if(w.y > window.innerHeight - 40){
w.remove()
words.splice(i,1)
life--
lifeEl.innerText = life
}

})

if(life <= 0){
alert("GAME OVER")
location.reload()
}

requestAnimationFrame(update)
}

update()

/* digitação REAL */
document.addEventListener("keydown",(e)=>{

let key = e.key.toLowerCase()

words.forEach((w,i)=>{

let letters = w.querySelectorAll("span")

/* verifica próxima letra */
if(key === w.text[w.typed]){

letters[w.typed].classList.add("correct")
w.typed++

/* terminou palavra */
if(w.typed === w.text.length){
w.remove()
words.splice(i,1)
currentInput = ""
}

}else{
/* errou = reseta progresso dessa palavra */
w.typed = 0
letters.forEach(l=>l.classList.remove("correct"))
}

})

})

/* spawn */
setInterval(spawnWord, spawnRate)

/* tempo */
setInterval(()=>{
time++
timeEl.innerText = time

/* dificuldade suave */
speed += 0.003

},1000)

</script>

</body>
</html>
