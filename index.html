<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boneco andando</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
}

#player{
position:absolute;
left:300px;
top:200px;
display:flex;
flex-direction:column;
align-items:center;
}

/* cabeça */
.head{
width:40px;
height:40px;
background:#f1c27d;
border:2px solid black;
}

/* corpo */
.body{
width:40px;
height:50px;
background:#3cb043;
border:2px solid black;
position:relative;
}

/* braços */
.arm{
width:12px;
height:45px;
background:#f1c27d;
border:2px solid black;
position:absolute;
top:0;
transform-origin:top;
}

.arm.left{
left:-16px;
}

.arm.right{
right:-16px;
}

/* pernas */
.legs{
display:flex;
gap:10px;
margin-top:2px;
}

.leg{
width:12px;
height:40px;
background:#1e3d59;
border:2px solid black;
transform-origin:top;
}

/* animação andando */

.walk .leg.left{
animation:leg1 0.4s infinite alternate;
}

.walk .leg.right{
animation:leg2 0.4s infinite alternate;
}

.walk .arm.left{
animation:arm1 0.4s infinite alternate;
}

.walk .arm.right{
animation:arm2 0.4s infinite alternate;
}

@keyframes leg1{
from{transform:rotate(25deg)}
to{transform:rotate(-25deg)}
}

@keyframes leg2{
from{transform:rotate(-25deg)}
to{transform:rotate(25deg)}
}

@keyframes arm1{
from{transform:rotate(-25deg)}
to{transform:rotate(25deg)}
}

@keyframes arm2{
from{transform:rotate(25deg)}
to{transform:rotate(-25deg)}
}

#ground{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#5a3d1e;
}

</style>

</head>

<body>

<div id="player">

<div class="head"></div>

<div class="body">
<div class="arm left"></div>
<div class="arm right"></div>
</div>

<div class="legs">
<div class="leg left"></div>
<div class="leg right"></div>
</div>

</div>

<div id="ground"></div>

<script>

const player = document.getElementById("player")

let x = 300
let y = 200
let speed = 5

let keys = {}

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true
})

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false
})

function gameLoop(){

let moving = false

if(keys["a"] || keys["arrowleft"]){
x -= speed
moving = true
}

if(keys["d"] || keys["arrowright"]){
x += speed
moving = true
}

if(keys["w"] || keys["arrowup"]){
y -= speed
moving = true
}

if(keys["s"] || keys["arrowdown"]){
y += speed
moving = true
}

player.style.left = x + "px"
player.style.top = y + "px"

if(moving){
player.classList.add("walk")
}else{
player.classList.remove("walk")
}

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
