<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alarme PRO MAX</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

input, button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    cursor: pointer;
}

#lista {
    margin-top: 20px;
}

.alarm {
    background: #1e293b;
    padding: 15px;
    margin: 10px auto;
    border-radius: 12px;
    width: 260px;
}

.ativo {
    color: #22c55e;
}

.desligado {
    color: #ef4444;
}

#parar {
    background: red;
    color: white;
    display: none;
}
</style>

</head>
<body>

<h1>⏰ Alarme PRO MAX</h1>

<input type="text" id="hora" maxlength="5" placeholder="HH:MM">
<br>

<input type="file" id="audioFile" accept="audio/*">
<br>

<button onclick="adicionarAlarme()">Adicionar</button>

<br><br> <button id="parar" onclick="pararAlarme()">PARAR ALARME</button>

<div id="lista"></div>

<script>
let alarmes = JSON.parse(localStorage.getItem("alarmes")) || [];

function salvar() {
    localStorage.setItem("alarmes", JSON.stringify(alarmes));
}

// AUTO :
const inputHora = document.getElementById("hora");

inputHora.addEventListener("input", function () {
    let valor = inputHora.value.replace(/\D/g, "");

    if (valor.length >= 3) {
        valor = valor.slice(0, 2) + ":" + valor.slice(2, 4);
    }

    inputHora.value = valor;
});

function adicionarAlarme() {
    const hora = inputHora.value;
    const file = document.getElementById("audioFile").files[0];

    if (!hora || hora.length < 5) {
        alert("Digite um horário válido!");
        return;
    }

    let audioURL = file ? URL.createObjectURL(file) : "";

    alarmes.push({
        hora: hora,
        audio: audioURL,
        ativo: true
    });

    salvar();
    render();
}

function remover(index) {
    alarmes.splice(index, 1);
    salvar();
    render();
}

function toggle(index) {
    alarmes[index].ativo = !alarmes[index].ativo;
    salvar();
    render();
}

function editar(index) {
    let novaHora = prompt("Novo horário (HH:MM):", alarmes[index].hora);

    if (novaHora) {
        alarmes[index].hora = novaHora;
        alarmes[index].ativo = true;
        salvar();
        render();
    }
}

function render() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    alarmes.forEach((a, i) => {
        lista.innerHTML += `
        <div class="alarm">
            <h3>${a.hora}</h3>
            <p class="${a.ativo ? 'ativo' : 'desligado'}">
                ${a.ativo ? 'Ativo' : 'Desligado'}
            </p>

            <button onclick="toggle(${i})">Ligar/Desligar</button>
            <button onclick="editar(${i})">Editar</button>
            <button onclick="remover(${i})">Remover</button>
        </div>
        `;
    });
}

let tocando = null;
let repetindo = false;

function pararAlarme() {
    repetindo = false;

    if (tocando) {
        tocando.pause();
        tocando = null;
    }

    document.getElementById("parar").style.display = "none";
}

setInterval(() => {
    const agora = new Date();
    const h = agora.getHours().toString().padStart(2, "0");
    const m = agora.getMinutes().toString().padStart(2, "0");
    const atual = h + ":" + m;

    alarmes.forEach(a => {
        if (a.hora === atual && a.ativo && !repetindo) {

            repetindo = true;
            document.getElementById("parar").style.display = "inline-block";

            function tocarAlarme() {
                if (!repetindo) return;

                tocando = new Audio(a.audio || "https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
                tocando.play();

                // toca 30s
                setTimeout(() => {
                    if (tocando) {
                        tocando.pause();
                        tocando = null;
                    }
                }, 30000);

                // repete depois
                setTimeout(() => {
                    tocarAlarme();
                }, 60000);
            }

            tocarAlarme();
        }
    });

}, 1000);

render();
</script>

</body>
</html>
