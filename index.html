<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini-Zap</title>
<style>
body { font-family: Arial; background: #f0f0f0; padding: 20px; }
#profilePreview { width: 80px; height: 80px; border-radius: 50%; }
#contacts img { width: 50px; height: 50px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
#messages { border: 1px solid #ccc; padding: 10px; height: 200px; overflow-y: scroll; background: #fff; margin-bottom: 10px; }
</style>
</head>
<body>

<h2>Seu Perfil</h2>
<form id="profileForm">
  <input type="text" id="username" placeholder="Seu nome" required>
  <input type="file" id="profilePic" accept="image/*" required>
  <button type="submit">Salvar Perfil</button>
</form>
<img id="profilePreview" src="">

<hr>

<h2>Adicionar Contato</h2>
<input type="text" id="addUserId" placeholder="ID do amigo">
<button onclick="addFriend()">Adicionar</button>

<div id="contacts"></div>

<hr>

<h2>Mensagens</h2>
<div id="messages"></div>
<input type="text" id="messageText" placeholder="Digite sua mensagem">
<select id="friendSelect"></select>
<button onclick="sendMessage()">Enviar</button>

<script src="script.js"></script>
</body>
</html>
