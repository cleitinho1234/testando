<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alarme PRO</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

input, button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
}

.alarm {
    background: #222;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
}
</style>

</head>
<body>

<h1>⏰ Alarme PRO</h1>

<input type="time" id="hora">
<br>

<input type="file" id="audioFile" accept="audio/*">
<br>

<button onclick="adicionarAlarme()">Adicionar Alarme</button>

<div id="lista"></div>

<script>
let alarmes = JSON.parse(localStorage.getItem("alarmes")) || [];

function salvar() {
    localStorage.setItem("alarmes", JSON.stringify(alarmes));
}

function adicionarAlarme() {
    const hora = document.getElementById("hora").value;
    const file = document.getElementById("audioFile").files[0];

    if (!hora) {
        alert("Escolha um horário!");
        return;
    }

    let audioURL = "";

    if (file) {
        audioURL = URL.createObjectURL(file);
    }

    alarmes.push({
        hora: hora,
        audio: audioURL,
        ativo: true
    });

    salvar();
    render();
}

function remover(index) {
    alarmes.splice(index, 1);
    salvar();
    render();
}

function render() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    alarmes.forEach((a, i) => {
        lista.innerHTML += `
        <div class="alarm">
            ⏰ ${a.hora}
            <br>
            <button onclick="remover(${i})">Remover</button>
        </div>
        `;
    });
}

setInterval(() => {
    const agora = new Date();
    const h = agora.getHours().toString().padStart(2, "0");
    const m = agora.getMinutes().toString().padStart(2, "0");
    const atual = h + ":" + m;

    alarmes.forEach(a => {
        if (a.hora === atual && a.ativo) {
            let audio;

            if (a.audio) {
                audio = new Audio(a.audio);
            } else {
                audio = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
            }

            audio.play();
            a.ativo = false;
        }
    });

    salvar();

}, 1000);

render();
</script>

</body>
</html>
