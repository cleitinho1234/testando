<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<!-- 🔥 RESPONSIVO -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini-Zap</title>

<style>
body {
  font-family: Arial;
  background: #e5ddd5;
  margin: 0;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
  padding: 10px;
}

/* PERFIL */
#profilePreview {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

/* CONTATOS */
#contacts div {
  padding: 10px;
  background: #fff;
  margin-bottom: 5px;
  border-radius: 8px;
  cursor: pointer;
}

/* CHAT */
#messages {
  height: 300px;
  overflow-y: auto;
  background: #efeae2;
  padding: 10px;
  border-radius: 10px;
}

/* MENSAGEM */
.message {
  display: flex;
  align-items: flex-end;
  margin: 5px 0;
}

.message.me {
  justify-content: flex-end;
}

.message.other {
  justify-content: flex-start;
}

.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

.bubble {
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
}

.me .bubble {
  background: #dcf8c6;
}

.other .bubble {
  background: white;
}

/* INPUT */
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Seu Perfil</h2>

<form id="profileForm">
  <input type="text" id="username" placeholder="Seu nome">
  <input type="file" id="profilePic" accept="image/*">
  <button type="submit">Salvar Perfil</button>
</form>

<img id="profilePreview">

<p>Seu ID: <span id="userIdDisplay"></span></p>
<button id="copyIdBtn">Copiar ID</button>

<hr>

<h2>Contatos</h2>

<input type="text" id="addUserId" placeholder="ID do amigo">
<button id="addFriendBtn">Adicionar</button>

<div id="contacts"></div>

<hr>

<h2>Chat</h2>

<!-- 🔥 NOVO: MOSTRA COM QUEM VOCÊ ESTÁ CONVERSANDO -->
<h3 id="chatTitle">Selecione um contato</h3>

<div id="messages"></div>

<input type="text" id="messageText" placeholder="Digite sua mensagem">
<select id="friendSelect"></select>
<button id="sendMessageBtn">Enviar</button>

</div>

<script src="script.js"></script>

</body>
</html>
