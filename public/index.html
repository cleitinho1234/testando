<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini-Zap</title>

<style>
body {
  font-family: Arial;
  background: #e5ddd5;
  margin: 0;
}

#home {
  padding: 10px;
}

#chatScreen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #efeae2;
  flex-direction: column;
}

/* HEADER */
#chatHeader {
  background: #075e54;
  color: white;
  padding: 10px;
  display: flex;
  align-items: center;
}

#chatHeader button {
  margin-right: 10px;
}

#chatAvatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 10px;
}

#chatInfo {
  display: flex;
  flex-direction: column;
}

#typingStatus {
  font-size: 12px;
  color: #dcdcdc;
  height: 15px;
}

/* CHAT */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* INPUT */
#chatInput {
  display: flex;
  padding: 10px;
  background: #ddd;
}

#chatInput input {
  flex: 1;
  padding: 10px;
}

#chatInput button {
  padding: 10px;
  margin-left: 5px;
}

/* CONTATOS */
.contact {
  background: white;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  cursor: pointer;

  /* 🚫 BLOQUEAR COPIAR */
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

.contact * {
  user-select: none;
  -webkit-user-select: none;
}

/* MENSAGEM */
.message {
  display: flex;
  align-items: flex-end;
  margin: 5px 0;
}

.me {
  justify-content: flex-end;
}

.other {
  justify-content: flex-start;
}

.bubble {
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
  margin: 5px;
}

.me .bubble {
  background: #dcf8c6;
}

.other .bubble {
  background: white;
}

/* FOTO PERFIL */
#profilePreview {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: block;
  margin-bottom: 10px;
}

/* 🌈 MODAL RGB */

#confirmModal {
  display: none;
  position: fixed;
