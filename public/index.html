<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini-Zap</title>

<style>
body {
  font-family: Arial;
  background: #e5ddd5;
  margin: 0;
}

#home {
  padding: 10px;
}

#chatScreen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #efeae2;
  flex-direction: column;
}

#chatHeader {
  background: #075e54;
  color: white;
  padding: 10px;
  display: flex;
  align-items: center;
}

#chatHeader button {
  margin-right: 10px;
}

#chatAvatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 10px;
}

#chatInfo {
  display: flex;
  flex-direction: column;
}

#typingStatus {
  font-size: 12px;
  color: #dcdcdc;
  height: 15px;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

#chatInput {
  display: flex;
  padding: 10px;
  background: #ddd;
  align-items: center;
}

#chatInput input {
  flex: 1;
  padding: 10px;
}

#chatInput button {
  padding: 10px;
  margin-left: 5px;
}

.contact {
  background: white;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  cursor: pointer;
}

.message {
  display: flex;
  align-items: flex-end;
  margin: 5px 0;
}

.me {
  justify-content: flex-end;
}

.other {
  justify-content: flex-start;
}

.bubble {
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
  margin: 5px;
}

.me .bubble {
  background: #dcf8c6;
}

.other .bubble {
  background: white;
}

#profilePreview {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: block;
  margin-bottom: 10px;
}

#confirmModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.5);
  z-index: 999;
}

#confirmBox {
  background: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  width: 250px;
}

#confirmBox button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#confirmYes {
  background: red;
  color: white;
}

#confirmNo {
  background: gray;
  color: white;
}
</style>
</head>

<body>

<div id="home">

<h2>Seu Perfil</h2>

<img id="profilePreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<form id="profileForm">
  <input type="text" id="username" placeholder="Seu nome">
  <input type="file" id="profilePic">
  <button>Salvar</button>
</form>

<p>ID: <span id="userIdDisplay"></span></p>

<hr>

<h2>Contatos</h2>

<input type="text" id="addUserId" placeholder="ID do amigo">
<button id="addFriendBtn">Adicionar</button>

<div id="contacts"></div>

</div>

<div id="chatScreen">

<div id="chatHeader">
  <button onclick="voltar()">⬅</button>
  <img id="chatAvatar">

  <div id="chatInfo">
    <span id="chatName"></span>
    <div id="typingStatus"></div>
  </div>
</div>

<div id="messages"></div>

<div id="chatInput">
  <input type="text" id="messageText" placeholder="Mensagem">
  <button id="sendMessageBtn">Enviar</button>
</div>

</div>

<div id="confirmModal">
  <div id="confirmBox">
    <p>Excluir contato?</p>
    <button id="confirmYes">Excluir</button>
    <button id="confirmNo">Cancelar</button>
  </div>
</div>

<!-- 🔥 SOCKET.IO (OBRIGATÓRIO) -->
<script src="/socket.io/socket.io.js"></script>

<!-- 🔥 SEU SCRIPT -->
<script src="script.js"></script>

</body>
</html>
