<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini-Zap</title>

<style>
  /* --- ESTILO DA BARRA DE ROLAGEM CUSTOMIZADA --- */
  #scrollHandle {
    position: absolute;
    right: 5px;
    top: 20%;
    width: 35px;
    height: 60px;
    background: rgba(7, 94, 84, 0.7); /* Cor do WhatsApp com transparência */
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    z-index: 999;
    touch-action: none; /* Importante: impede o navegador de agir */
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
  }
  
  #scrollHandle::before { content: "↕"; } /* Ícone de setas */

  /* O resto do seu CSS */
  html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; margin: 0; }
  body { font-family: Arial, sans-serif; background: #e5ddd5; }
  #chatScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #efeae2; flex-direction: column; }
  #messages { flex: 1; overflow-y: scroll; padding: 10px; -webkit-overflow-scrolling: auto; }
  /* Removi o scrollbar padrão para não confundir */
  #messages::-webkit-scrollbar { width: 0px; }

  #chatHeader { background: #075e54; color: white; padding: 10px; display: flex; align-items: center; }
  #chatAvatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 10px; }
  #chatInput { display: flex; padding: 10px; background: #f0f0f0; align-items: center; }
  #chatInput input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; margin: 0 8px; }
  #sendMessageBtn { width: 45px; height: 45px; border: none; background: #075e54; color: white; border-radius: 50%; cursor: pointer; }
  .message { display: flex; margin: 5px 0; }
  .me { justify-content: flex-end; }
  .bubble { padding: 10px; border-radius: 10px; max-width: 75%; background: white; }
  .me .bubble { background: #dcf8c6; }
</style>
</head>
<body>

<div id="chatScreen">
  <div id="chatHeader">
    <button onclick="voltar()" style="background:none; border:none; color:white; font-size:20px;">⬅</button>
    <img id="chatAvatar">
    <div id="chatName" style="font-weight:bold;"></div>
  </div>

  <div style="position: relative; flex: 1; overflow: hidden;">
    <div id="messages"></div>
    <div id="scrollHandle"></div>
  </div>

  <div id="chatInput">
    <input type="text" id="messageText" placeholder="Mensagem">
    <button id="sendMessageBtn">➤</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
