<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini-Zap</title>
    <style>
        /* Cole aqui o seu CSS original do index.html */
    </style>
</head>
<body>

<div id="home">
    <div class="profile-card">
        <img id="profilePreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        <form id="profileForm">
            <input type="text" id="username" placeholder="Seu nome" style="width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px;">
            <input type="file" id="profilePic" accept="image/*" style="font-size: 12px; margin-bottom: 10px;">
            <button type="submit" style="background:#25D366; color:white; border:none; padding:12px 25px; border-radius:5px; font-weight:bold; cursor:pointer; width:100%;">SALVAR PERFIL</button>
        </form>
        <p style="font-size:12px; color:#666; margin-top:10px;">Seu ID: <span id="userIdDisplay" style="font-weight:bold;"></span></p>
    </div>
    
    <div style="display:flex; gap:5px; flex-shrink: 0;">
        <input type="text" id="addUserId" placeholder="ID do amigo" style="flex:1; padding:10px; border:1px solid #ccc; border-radius:5px;">
        <button id="addFriendBtn" style="background:#075e54; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">ADD</button>
    </div>
    <div id="contacts" style="margin-top:15px;"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
