<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini-Zap</title>

<style>
body {
  font-family: Arial;
  background: #e5ddd5;
  margin: 0;
}

#home {
  padding: 10px;
}

#chatScreen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #efeae2;
  flex-direction: column;
}

/* HEADER */
#chatHeader {
  background: #075e54;
  color: white;
  padding: 10px;
  display: flex;
  align-items: center;
}

#chatHeader button {
  margin-right: 10px;
}

#chatAvatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 10px;
}

/* CHAT */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* INPUT */
#chatInput {
  display: flex;
  padding: 10px;
  background: #ddd;
}

#chatInput input {
  flex: 1;
  padding: 10px;
}

#chatInput button {
  padding: 10px;
}

/* CONTATOS */
.contact {
  background: white;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  cursor: pointer;
}

/* MENSAGEM */
.message {
  display: flex;
  align-items: flex-end;
  margin: 5px 0;
}

.me {
  justify-content: flex-end;
}

.other {
  justify-content: flex-start;
}

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
}

.bubble {
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
  margin: 5px;
}

.me .bubble {
  background: #dcf8c6;
}

.other .bubble {
  background: white;
}
</style>
</head>

<body>

<div id="home">

<h2>Seu Perfil</h2>

<form id="profileForm">
  <input type="text" id="username" placeholder="Seu nome">
  <input type="file" id="profilePic">
  <button>Salvar</button>
</form>

<p>ID: <span id="userIdDisplay"></span></p>

<hr>

<h2>Contatos</h2>

<input type="text" id="addUserId" placeholder="ID do amigo">
<button id="addFriendBtn">Adicionar</button>

<div id="contacts"></div>

</div>

<!-- CHAT -->
<div id="chatScreen">

<div id="chatHeader">
  <button onclick="voltar()">⬅</button>
  <img id="chatAvatar">
  <span id="chatName"></span>
</div>

<div id="messages"></div>

<div id="chatInput">
  <input type="text" id="messageText" placeholder="Mensagem">
  <button id="sendMessageBtn">Enviar</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
