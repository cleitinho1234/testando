<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<!-- 🔥 ESSENCIAL PRA CELULAR -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini-Zap-4</title>

<style>
body {
  font-family: Arial;
  background: #f0f0f0;
  padding: 10px;
  margin: 0;
  max-width: 600px;
  margin: auto;
}

/* inputs, botões e select */
input, button, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  font-size: 16px;
  box-sizing: border-box;
}

/* imagem perfil */
#profilePreview {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-top: 10px;
}

/* contatos */
#contacts div {
  padding: 10px;
  background: #ddd;
  margin-bottom: 5px;
  border-radius: 5px;
  font-size: 16px;
}

/* mensagens */
#messages {
  border: 1px solid #ccc;
  padding: 10px;
  height: 250px;
  overflow-y: scroll;
  background: #fff;
  margin-bottom: 10px;
  font-size: 16px;
}

/* títulos */
h2 {
  font-size: 18px;
}

/* botão */
button {
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Seu Perfil</h2>

<form id="profileForm">
  <input type="text" id="username" placeholder="Seu nome">
  <input type="file" id="profilePic" accept="image/*">
  <button type="submit">Salvar Perfil</button>
</form>

<img id="profilePreview" src="">

<p>
  Seu ID: 
  <span id="userIdDisplay"></span> 
  <button id="copyIdBtn">Copiar ID</button>
</p>

<hr>

<h2>Adicionar Contato</h2>

<input type="text" id="addUserId" placeholder="ID do amigo">
<button id="addFriendBtn">Adicionar</button>

<div id="contacts"></div>

<hr>

<h2>Mensagens</h2>

<div id="messages"></div>

<input type="text" id="messageText" placeholder="Digite sua mensagem">
<select id="friendSelect"></select>
<button id="sendMessageBtn">Enviar</button>

<script src="script.js"></script>

</body>
</html>
